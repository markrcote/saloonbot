services:
  saloonbot-server:
    container_name: saloonbot-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        GIT_SHA: ${GIT_SHA}
    image: ghcr.io/markrcote/saloonbot-server:main
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=saloonbot
      - MYSQL_PASSWORD=saloonbot_password
      - MYSQL_DATABASE=saloonbot
      - SALOONBOT_DEBUG=${SALOONBOT_DEBUG}
    volumes:
      - /etc/saloonbot/secrets:/run/secrets:ro
    depends_on:
      - redis
      - mysql
    logging:
      driver: journald
      options:
        tag: saloonbot-server
  saloonbot-bot:
    container_name: saloonbot-bot
    build:
      context: .
      dockerfile: Dockerfile.bot
      args:
        GIT_SHA: ${GIT_SHA}
        SALOONBOT_DEBUG: ${SALOONBOT_DEBUG}
    image: ghcr.io/markrcote/saloonbot-bot:main
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SALOONBOT_DEBUG=${SALOONBOT_DEBUG}
    secrets:
      - discord_token
      - discord_guilds
    depends_on:
      - redis
    logging:
      driver: journald
      options:
        tag: saloonbot-bot
  redis:
    container_name: saloonbot-redis
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
  mysql:
    container_name: saloonbot-mysql
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=saloonbot
      - MYSQL_USER=saloonbot
      - MYSQL_PASSWORD=saloonbot_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
  redis-exporter:
    container_name: saloonbot-redis-exporter
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    logging:
      driver: journald
      options:
        tag: saloonbot-redis-exporter
  mysqld-exporter:
    container_name: saloonbot-mysqld-exporter
    image: prom/mysqld-exporter:latest
    restart: always
    command:
      - --config.my-cnf=/run/secrets/mysql_exporter_cnf
    volumes:
      - /etc/saloonbot/secrets:/run/secrets:ro
    ports:
      - "9104:9104"
    depends_on:
      - mysql
    logging:
      driver: journald
      options:
        tag: saloonbot-mysqld-exporter
volumes:
  mysql_data:
secrets:
  discord_token:
    file: /etc/saloonbot/secrets/discord_token
  discord_guilds:
    file: /etc/saloonbot/secrets/discord_guilds
