services:
  saloonbot-server:
    container_name: saloonbot-server
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        GIT_SHA: ${GIT_SHA}
    image: ghcr.io/markrcote/saloonbot-server:main
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=saloonbot
      - MYSQL_PASSWORD=saloonbot_password
      - MYSQL_DATABASE=saloonbot
      - SALOONBOT_DEBUG=${SALOONBOT_DEBUG}
    volumes:
      - /etc/saloonbot/secrets:/run/secrets:ro
    depends_on:
      - redis
      - mysql
    logging:
      driver: journald
      options:
        tag: saloonbot-server
    labels:
      - com.centurylinklabs.watchtower.enable=true
  saloonbot-bot:
    container_name: saloonbot-bot
    build:
      context: .
      dockerfile: Dockerfile.bot
      args:
        GIT_SHA: ${GIT_SHA}
        SALOONBOT_DEBUG: ${SALOONBOT_DEBUG}
    image: ghcr.io/markrcote/saloonbot-bot:main
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SALOONBOT_DEBUG=${SALOONBOT_DEBUG}
    volumes:
      - /etc/saloonbot/secrets:/run/secrets:ro
    depends_on:
      - redis
    logging:
      driver: journald
      options:
        tag: saloonbot-bot
    labels:
      - com.centurylinklabs.watchtower.enable=true
  redis:
    container_name: saloonbot-redis
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
  mysql:
    container_name: saloonbot-mysql
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=saloonbot
      - MYSQL_USER=saloonbot
      - MYSQL_PASSWORD=saloonbot_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
  redis-exporter:
    container_name: saloonbot-redis-exporter
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    logging:
      driver: journald
      options:
        tag: saloonbot-redis-exporter
  mysqld-exporter:
    container_name: saloonbot-mysqld-exporter
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    command:
      - --config.my-cnf=/run/secrets/mysql_exporter_cnf
    secrets:
      - mysql_exporter_cnf
    ports:
      - "9104:9104"
    depends_on:
      - mysql
    logging:
      driver: journald
      options:
        tag: saloonbot-mysqld-exporter
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.54
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_ROLLING_RESTART=false
      - WATCHTOWER_TIMEOUT=60s
      - WATCHTOWER_POLL_INTERVAL=120
      - TZ=America/Toronto
    labels:
      - com.centurylinklabs.watchtower.enable=false
volumes:
  mysql_data:
secrets:
  mysql_exporter_cnf:
    file: /etc/saloonbot/secrets/mysql_exporter.cnf
